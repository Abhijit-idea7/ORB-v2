name: ORB v2 — Dual-Window Trading Bot

# -----------------------------------------------------------------------
# MANUAL TRIGGER — click "Run workflow" each morning at 09:10 IST.
#
#   09:10 IST trigger + 6-hour GitHub hard cap = 15:10 IST.
#   The bot waits internally until 09:20 IST before entering trades,
#   then squares off all positions at 15:10 IST automatically.
#
# STRATEGY: Dual-Window ORB with NIFTY Regime Filter
#   • Universe    : 55 stocks (top 25/day by ATR%)
#   • Position    : Rs 1,50,000 per trade (up to 10 simultaneous)
#   • Window 1    : 15-min ORB, entries 09:30 – 11:00 IST
#   • Window 2    : 30-min ORB, entries 09:45 – 11:30 IST
#   • NIFTY BULL  → LONG breakouts only (max 10 positions)
#   • NIFTY BEAR  → SHORT breakdowns only (max 5 positions)
#   • NIFTY NEUTRAL → both directions (max 8 positions)
#
# HOW TO START:
#   GitHub → Actions → "ORB v2 — Dual-Window Trading Bot" → "Run workflow"
# -----------------------------------------------------------------------

on:
  workflow_dispatch:

concurrency:
  group: orb-v2-trading-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trade:
    name: ORB v2 — Live Trading
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ORB v2 strategy
        env:
          STOCKSDEVELOPER_API_KEY: ${{ secrets.STOCKSDEVELOPER_API_KEY }}
          STOCKSDEVELOPER_ACCOUNT: ${{ secrets.STOCKSDEVELOPER_ACCOUNT }}
        run: |
          echo "============================================"
          echo "  ORB v2 Bot — $(date +'%Y-%m-%d %H:%M')"
          echo "  Universe : 55 stocks, top 25 by ATR%"
          echo "  Positions: Rs1,50,000 each, max 10"
          echo "  Window 1 : 15-min ORB → 11:00 IST"
          echo "  Window 2 : 30-min ORB → 11:30 IST"
          echo "  Regime   : NIFTY filter active"
          echo "============================================"
          python main.py

      - name: Save performance log to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add performance_log_ORB.csv 2>/dev/null || true
          git diff --staged --quiet \
            && echo "No new trades to commit." \
            || git commit -m "perf: ORB v2 trading log $(date -u '+%Y-%m-%d')" \
            && git push origin HEAD:${{ github.ref_name }}
